
<div class="checkout-card">
<h2>Checkout Asset</h2>
<label for="category">Asset Category</label>

<select id="category" name="category" [(ngModel)]="selectedCategory">
  <option value="">Select a category</option>

  @for (category of categories; track category) {
    <option [value]="category">
      {{ category }}
    </option>
  }
</select>

<label for="reason">Reason</label>

<textarea
  id="reason"
  name="reason"
  [(ngModel)]="requestReason"
  placeholder="Why do you need this type of asset?"
></textarea>

<button type="button" (click)="requestCheckout()">Submit Request</button>

@if (successMessage) {
  <p class="success">{{ successMessage }}</p>
}

@if (errorMessage) {
  <p class="error">{{ errorMessage }}</p>
}
</div>
